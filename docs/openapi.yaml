      {
        summary: Update application notes,
        parameters:
          [{ name: id, in: path, required: true, schema: { type: integer } }],
        responses:
          {
            "200": { $ref: "#/components/responses/Ok" },
            "422": { $ref: "#/components/responses/Error" },
          },
      }
  /employer/interviews:
    get:
      {
        summary: Employer interviews,
        responses: { "200": { $ref: "#/components/responses/Ok" } },
      }
    post:
      {
        summary: Schedule interview,
        responses:
          {
            "201": { $ref: "#/components/responses/Ok" },
            "403": { $ref: "#/components/responses/Error" },
            "422": { $ref: "#/components/responses/Error" },
          },
      }
  /employer/interviews/{id}:
    get:
      {
        summary: Employer interview detail,
        parameters:
          [{ name: id, in: path, required: true, schema: { type: integer } }],
        responses:
          {
            "200": { $ref: "#/components/responses/Ok" },
            "404": { $ref: "#/components/responses/Error" },
          },
      }
    put:
      {
        summary: Update interview,
        parameters:
          [{ name: id, in: path, required: true, schema: { type: integer } }],
        responses:
          {
            "200": { $ref: "#/components/responses/Ok" },
            "422": { $ref: "#/components/responses/Error" },
          },
      }
    delete:
      {
        summary: Cancel interview,
        parameters:
          [{ name: id, in: path, required: true, schema: { type: integer } }],
        responses: { "200": { $ref: "#/components/responses/Ok" } },
      }
  /employer/interviews/{id}/feedback:
    post:
      {
        summary: Submit interview feedback,
        parameters:
          [{ name: id, in: path, required: true, schema: { type: integer } }],
        responses:
          {
            "200": { $ref: "#/components/responses/Ok" },
            "422": { $ref: "#/components/responses/Error" },
          },
      }
  /employer/saved-applicants:
    get:
      {
        summary: Saved applicants,
        responses: { "200": { $ref: "#/components/responses/Ok" } },
      }
  /employer/saved-applicants/{applicantId}:
    post:
      {
        summary: Toggle saved applicant,
        parameters:
          [
            {
              name: applicantId,
              in: path,
              required: true,
              schema: { type: integer },
            },
          ],
        responses:
          {
            "200": { $ref: "#/components/responses/Ok" },
            "403": { $ref: "#/components/responses/Error" },
          },
      }

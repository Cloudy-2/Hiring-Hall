          [{ name: id, in: path, required: true, schema: { type: integer } }],
        responses: { "200": { $ref: "#/components/responses/Ok" } },
      }
  /employer/pipeline-stages:
    get:
      {
        summary: Pipeline stages,
        responses: { "200": { $ref: "#/components/responses/Ok" } },
      }
  /employer/applications:
    get:
      {
        summary: Employer applications across all company jobs,
        responses: { "200": { $ref: "#/components/responses/Ok" } },
      }
  /employer/jobs/{id}/applications:
    get:
      {
        summary: Job applications,
        parameters:
          [{ name: id, in: path, required: true, schema: { type: integer } }],
        responses:
          {
            "200": { $ref: "#/components/responses/Ok" },
            "404": { $ref: "#/components/responses/Error" },
          },
      }
  /employer/applications/{id}:
    get:
      {
        summary: Employer application detail,
        parameters:
          [{ name: id, in: path, required: true, schema: { type: integer } }],
        responses:
          {
            "200": { $ref: "#/components/responses/Ok" },
